<!doctype html>
<html lang="id">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>B3 Toolkit</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
	<style>
		body{background:#f5f5f5}.container{max-width:760px}.card{margin-top:20px}
		pre{background:#222;color:#0f0;padding:10px;border-radius:6px;max-height:220px;overflow:auto}
		#captchaImage{max-width:320px;border:1px solid #ccc;padding:6px;background:#fff}
	</style>
</head>
<body>
	<div class="container py-3">

		<div class="card">
			<div class="card-header d-flex justify-content-between">
				<b>Login</b>
				<button class="btn btn-sm btn-outline-secondary" data-bs-toggle="collapse" data-bs-target="#loginCard">Minimize</button>
			</div>
			<div id="loginCard" class="collapse show">
				<div class="card-body">
					<input id="nip" class="form-control mb-2" placeholder="NIP">
					<div class="input-group mb-2"><input id="password" type="password" class="form-control" placeholder="Password"><button id="view" class="btn btn-outline-secondary">👁</button></div>
					<img id="captchaImage"><br>
					<button id="gen" class="btn btn-warning mt-2">Generate Captcha</button>
					<pre id="generateRes" class="mt-2">-</pre>
					<input id="cap" class="form-control mt-2" placeholder="Captcha">
					<button id="login" class="btn btn-primary mt-2">Login</button>
					<pre id="loginRes" class="mt-2">-</pre>
					<label class="mt-2">Bearer Token</label>
					<textarea id="bearer" class="form-control" rows="3" readonly></textarea>
				</div>
			</div>
		</div>

		<div class="card">
			<div class="card-header d-flex justify-content-between">
				<b>Attendance</b>
				<button class="btn btn-sm btn-outline-secondary" data-bs-toggle="collapse" data-bs-target="#attCard">Minimize</button>
			</div>
			<div id="attCard" class="collapse show">
				<div class="card-body">
					<select id="type" class="form-select mb-2">
						<option value="clock-in">Hadir</option>
						<option value="clock-out">Pulang</option>
					</select>
					<input id="photo" type="file" class="form-control mb-2">
					<input id="lat" class="form-control mb-2" value="-6.314554">
					<input id="lon" class="form-control mb-2" value="106.986443">

					<div class="d-flex gap-2 mb-2">
						<button id="btnViewLocation" type="button" class="btn btn-info">📍 View Location</button>
						<button id="btnRandomLocation" type="button" class="btn btn-warning">🎲 Acak ≤100m</button>
						<button id="btnResetLocation" type="button" class="btn btn-secondary">↺ Reset</button>
					</div>
					<select id="device" class="form-select mb-2">
						<option value="s25">Samsung S25</option>
						<option value="s25u">Samsung S25 Ultra</option>
						<option value="s26">Samsung S26</option>
						<option value="s26u">Samsung S26 Ultra</option>
						<option value="ios17">iPhone (iOS 17)</option>
						<option value="ios18" selected>iPhone (iOS 18)</option>
						<option value="ios19">iPhone (iOS 19)</option>
					</select>
					<button id="submit" class="btn btn-success">Submit Attendance</button>
					<pre id="attRes" class="mt-2">-</pre>
				</div>
			</div>
		</div>

	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
		const DEFAULT_LAT=-6.314554,DEFAULT_LON=106.986443;
		btnViewLocation.onclick=()=>window.open(`https://www.google.com/maps?q=${lat.value},${lon.value}`,"_blank");
		btnResetLocation.onclick=()=>{lat.value=DEFAULT_LAT;lon.value=DEFAULT_LON;}
		btnRandomLocation.onclick=()=>{
		 const R=100*Math.sqrt(Math.random()),t=Math.random()*2*Math.PI;
		 const dx=R*Math.cos(t),dy=R*Math.sin(t);
		 const la=DEFAULT_LAT+dy/111320;
		 const lo=DEFAULT_LON+dx/(111320*Math.cos(DEFAULT_LAT*Math.PI/180));
		 lat.value=la.toFixed(6);lon.value=lo.toFixed(6);
		};
	</script>
	<script>
		let captchaId="";
		async function captcha(){
		 try{
		 generateRes.textContent="Loading...";
		 let r=await fetch("https://beetri.bekasikota.go.id/api/v1/auth/captcha",{headers:{Accept:"application/json"}});
		 let t=await r.text();generateRes.textContent=t;
		 let j=JSON.parse(t);captchaId=j.captcha_id;captchaImage.src=j.image_b64;
		 }catch(e){generateRes.textContent=e;}
		}
		window.onload=captcha;
		gen.onclick=captcha;
		view.onclick=()=>{password.type=password.type==="password"?"text":"password";}
		login.onclick=async()=>{
		 let p={nip:nip.value,password:password.value,remember_me:true,captcha_id:captchaId,captcha_answer:cap.value};
		 let r=await fetch("https://beetri.bekasikota.go.id/api/v1/auth/login",{method:"POST",headers:{"Accept":"application/json","Content-Type":"application/json"},body:JSON.stringify(p)});
		 let txt=await r.text();loginRes.textContent=txt;
		 try{let j=JSON.parse(txt);bearer.value=j.access_token||j.token||j.data?.access_token||j.data?.token||"";}catch{}
		}
		submit.onclick=async()=>{
		 let fd=new FormData();
		 const file=photo.files[0];const buf=await file.arrayBuffer();const blob=new Blob([buf],{type:"image/jpeg"});fd.append("photo",blob,"absensi_liveness.jpg");fd.append("lat",lat.value);fd.append("lon",lon.value);
		 const UA={s25:"Mozilla/5.0 (Linux; Android 15; SM-S931B) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/138.0.0.0 Mobile Safari/537.36",s25u:"Mozilla/5.0 (Linux; Android 15; SM-S938B) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/138.0.0.0 Mobile Safari/537.36",s26:"Mozilla/5.0 (Linux; Android 16; SM-S941B) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/138.0.0.0 Mobile Safari/537.36",s26u:"Mozilla/5.0 (Linux; Android 16; SM-S948B) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/138.0.0.0 Mobile Safari/537.36",ios17:"Mozilla/5.0 (iPhone; CPU iPhone OS 17_7 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.0 Mobile/15E148 Safari/604.1",ios18:"Mozilla/5.0 (iPhone; CPU iPhone OS 18_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/18.0 Mobile/15E148 Safari/604.1",ios19:"Mozilla/5.0 (iPhone; CPU iPhone OS 19_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/19.0 Mobile/15E148 Safari/604.1"};
		fd.append("device_id",UA[device.value]);
		 fd.append("is_fake_gps","false");
		 let r=await fetch("https://beetri.bekasikota.go.id/api/v1/attendance/"+type.value,{method:"POST",headers:{Authorization:"Bearer "+bearer.value},body:fd});
		 attRes.textContent=await r.text();
		}
		
		const DEFAULT_LAT=-6.314554,DEFAULT_LON=106.986443;
		btnViewLocation.onclick=()=>window.open(`https://www.google.com/maps?q=${lat.value},${lon.value}`,"_blank");
		btnResetLocation.onclick=()=>{lat.value=DEFAULT_LAT;lon.value=DEFAULT_LON;}
		btnRandomLocation.onclick=()=>{
		 const R=100*Math.sqrt(Math.random()),t=Math.random()*2*Math.PI;
		 const dx=R*Math.cos(t),dy=R*Math.sin(t);
		 const la=DEFAULT_LAT+dy/111320;
		 const lo=DEFAULT_LON+dx/(111320*Math.cos(DEFAULT_LAT*Math.PI/180));
		 lat.value=la.toFixed(6);lon.value=lo.toFixed(6);
		};
	</script>
</body>
</html>
